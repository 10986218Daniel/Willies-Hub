b<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart | WILLIES HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <a class="brand" href="./index.html">WILLIES HUB</a>
        <nav class="nav-links">
          <a href="./index.html">Continue shopping</a>
          <a href="./cart.html" class="cart-pill">Cart (<span data-cart-count>0</span>)</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1 class="section-title">Shopping Cart</h1>
      <section class="cart-layout">
        <div class="card">
          <div id="cart-list"></div>
        </div>

        <aside class="card">
          <h3>Order Summary</h3>
          <p>Total: <strong id="cart-total">$0.00</strong></p>
          <p class="empty-state">No online checkout. Complete your order through WhatsApp.</p>
          <button id="whatsapp-order" class="btn btn--dark">Order via WhatsApp</button>
        </aside>
      </section>
    </main>

    <div id="toast-host"></div>

    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/store.js"></script>
    <script src="./assets/js/ui.js"></script>
    <script src="./assets/js/cart.js"></script>
  </body>
</html>
