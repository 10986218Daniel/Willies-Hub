<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clothify Owner Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/admin.css" />
  </head>
  <body>
    <section id="login-view" class="login-wrap">
      <article class="card login-card">
        <h1>Owner Access</h1>
        <p class="hint">Simple protection only. Demo password: <strong>owner123</strong></p>
        <form id="login-form" class="form-grid">
          <input type="password" name="password" placeholder="Enter password" required />
          <button class="btn btn-dark" type="button" onclick="loginHandler()">Unlock Dashboard</button>
          <p id="login-feedback" class="hint"></p>
        </form>
      </article>
    </section>

    <section id="dashboard-view" class="hidden">
      <header class="topbar">
        <div class="container">
          <span class="brand">CLOTHIFY OWNER</span>
          <button id="logout-btn" class="btn btn-light">Logout</button>
        </div>
      </header>

      <main class="container">
        <div class="layout">
          <aside class="card">
            <h2 id="form-title">Add Product</h2>
            <form id="product-form" class="form-grid">
              <input name="name" placeholder="Product name" required />
              <input name="price" type="number" step="0.01" min="0" placeholder="Price" required />
              <select name="category" required>
                <option value="Men">Men</option>
                <option value="Women">Women</option>
                <option value="Shoes">Shoes</option>
                <option value="Accessories">Accessories</option>
              </select>
              <textarea name="description" placeholder="Description"></textarea>
              <input name="imageUrls" placeholder="Image URLs (comma separated)" />
              <input id="image-file" type="file" accept="image/*" multiple />
              <label><input name="inStock" type="checkbox" checked /> In stock</label>
              <button type="submit" class="btn btn-dark">Save Product</button>
              <button type="button" id="cancel-edit" class="btn btn-light">Cancel Edit</button>
            </form>
          </aside>

          <section class="card">
            <h2>Products</h2>
            <table class="table">
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>Category</th>
                  <th>Stock</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="products-body"></tbody>
            </table>
          </section>
        </div>
      </main>
    </section>

    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/admin-auth.js"></script>
    <script src="./assets/js/admin-ui.js"></script>
    <script src="./assets/js/admin-app.js"></script>
  </body>
</html>
